name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - run: bun install --frozen-lockfile
      - run: bun run lint
        continue-on-error: true
      - run: bun run typecheck
        continue-on-error: true

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - run: bun install --frozen-lockfile
      - name: Run unit tests
        run: |
          # Learning tests run in a separate process to avoid mock.module cross-contamination
          # Exclude known-broken tests: PluginManager (Redis timeouts) and WorkspaceSettingsService
          # TODO: Remove exclusions once pre-existing failures are fixed (tracked in GitHub Issues)
          bun test $(find src -name '*.test.ts' \
            -not -path '*/learning/__tests__/*' \
            -not -path '*/plugins/__tests__/plugin-manifest.test.ts' \
            -not -path '*/settings/workspace-settings/__tests__/workspace-settings.service.test.ts')
          bun test src/modules/learning/__tests__/
        env:
          CREDENTIALS_ENCRYPTION_KEY: ci-test-key-for-unit-tests-32bytes
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: supplymind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - run: bun install --frozen-lockfile
      - name: Enable pgvector extension
        run: psql postgresql://test:test@localhost:5432/supplymind_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run migrations
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/supplymind_test
      - name: Run integration tests
        run: |
          for f in $(find tests/integration -name '*.test.ts' | sort); do
            bun test "$f" || exit 1
          done
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/supplymind_test
          CREDENTIALS_ENCRYPTION_KEY: ci-test-key-for-integration-32bytes
