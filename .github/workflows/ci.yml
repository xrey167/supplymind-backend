name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - run: bun install --frozen-lockfile
      - run: bun run lint
        continue-on-error: true
      - run: bun run typecheck
        continue-on-error: true

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - run: bun install --frozen-lockfile
      - name: Run unit tests
        run: |
          # TaskManager and Learning tests run in separate processes to avoid mock.module
          # cross-contamination: learning/__tests__ mocks generators/analyzers globally which
          # would corrupt generator and analyzer test files that run after them.
          # client-pool.test.ts runs separately: bullmq.ts creates a Redis connection at module
          # load time; ioredis ECONNREFUSED errors can attach to pending promises in other tests
          # depending on filesystem traversal order, causing spurious failures.
          bun test $(find src -name '*.test.ts' \
            -not -path '*/learning/__tests__/*' \
            -not -path '*/infra/a2a/__tests__/task-manager.test.ts' \
            -not -path '*/infra/mcp/__tests__/client-pool.test.ts' \
            -not -path '*/jobs/notification/__tests__/*')
          bun test src/modules/learning/__tests__/
          bun test src/infra/a2a/__tests__/task-manager.test.ts
          bun test src/infra/mcp/__tests__/client-pool.test.ts
          bun test src/jobs/notification/__tests__/
        env:
          CREDENTIALS_ENCRYPTION_KEY: ci-test-key-for-unit-tests-32bytes
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: supplymind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - run: bun install --frozen-lockfile
      - name: Enable pgvector extension
        run: psql postgresql://test:test@localhost:5432/supplymind_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run migrations
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/supplymind_test
      - name: Run integration tests
        run: |
          for f in $(find tests/integration -name '*.test.ts' | sort); do
            bun test "$f" || exit 1
          done
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/supplymind_test
          CREDENTIALS_ENCRYPTION_KEY: ci-test-key-for-integration-32bytes
