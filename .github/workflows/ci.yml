name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
        continue-on-error: true
      - run: bun run typecheck
        continue-on-error: true

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run unit tests
        run: bun test src/
        env:
          CREDENTIALS_ENCRYPTION_KEY: ci-test-key-for-unit-tests-32bytes
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: supplymind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Enable pgvector extension
        run: psql postgresql://test:test@localhost:5432/supplymind_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run migrations
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/supplymind_test
      - name: Run integration tests
        run: bun test tests/integration/
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/supplymind_test
          CREDENTIALS_ENCRYPTION_KEY: ci-test-key-for-integration-32bytes
