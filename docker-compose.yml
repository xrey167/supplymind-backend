services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: supplymind
      POSTGRES_PASSWORD: supplymind
      POSTGRES_DB: supplymind_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplymind -d supplymind_dev"]
      interval: 2s
      timeout: 5s
      retries: 15

  postgres_test:
    image: pgvector/pgvector:pg16
    container_name: supplymind-postgres-test
    environment:
      POSTGRES_USER: supplymind
      POSTGRES_PASSWORD: supplymind
      POSTGRES_DB: supplymind_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data   # in-memory for fast test runs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplymind -d supplymind_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
